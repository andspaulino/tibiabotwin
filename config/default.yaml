# Configuração Padrão do Tibia Bot

loop_interval_ms: 50

window:
  tibia_title: "Tibia"
  obs_title: "obs"
  allow_partial_match: true

# Regiões de Interesse (ROIs) Relativas (0.0 a 1.0)
regions:
  hp:
    x: 0.187
    y: 0.000
    width: 0.281
    height: 0.018

  mana:
    x: 0.533
    y: 0.001
    width: 0.280
    height: 0.018

  status_bar:
    x: 0.477
    y: 0.001
    width: 0.057
    height: 0.017

  battle_list:
    x: 0.908
    y: 0.361
    width: 0.058
    height: 0.091

  # Calibre esta ROI no perfil antes de ativar a percepção do minimapa.
  minimap:
    x: 0.800
    y: 0.020
    width: 0.180
    height: 0.220

# A percepção do minimapa não gera inputs. Mantenha desativada até calibrar a ROI
# e configurar templates de marcadores no perfil.
minimap:
  enabled: false
  marker_templates: {}
  match_threshold: 0.88
  validate_cross: false
  cross_template_path: null
  cross_match_threshold: 0.88

# Cavebot permanece desativado por padrão e só propõe cliques em --observe-only.
cavebot:
  enabled: false
  marker: ""
  reserved_marker_ids: []
  expected_region:
    x: 0.0
    y: 0.0
    width: 1.0
    height: 1.0
  arrival_radius_pixels: 4.0
  progress_epsilon_pixels: 1.5
  stuck_timeout_ms: 15000
  click_cooldown_ms: 1500
  max_retries: 2

healer:
  enabled: true

  spell:
    enabled: true
    key: "1"
    hp_below: 80.0
    cooldown_ms: 1000

  mana_potion:
    enabled: true
    key: "2"
    mana_below: 50.0
    cooldown_ms: 1000

  emergency_potion:
    enabled: true
    key: "3"
    hp_below: 30.0
    cooldown_ms: 1000

combat:
  enabled: true
  attack_key: "space"
  cooldown_ms: 1000
  min_battle_pixels: 10
  target_template_path: "templates/target_red.png"
  target_match_threshold: 0.75

pz:
  enabled: true
  template_path: "templates/pz.png"
  match_threshold: 0.82

loot:
  enabled: true
  nearby_corpses_key: "x"
  delay_ms: 200
  cooldown_ms: 500
  require_empty_battle_list: false
  priority: 3
  emergency_hp_threshold: 30.0


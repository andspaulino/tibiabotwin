# Configuração Padrão do Tibia Bot

loop_interval_ms: 50

window:
  tibia_title: "Tibia"
  obs_title: "obs"
  allow_partial_match: true

# Regiões de Interesse (ROIs) Relativas (0.0 a 1.0)
regions:
  hp:
    x: 0.187
    y: 0.000
    width: 0.281
    height: 0.018

  mana:
    x: 0.533
    y: 0.001
    width: 0.280
    height: 0.018

  status_bar:
    x: 0.477
    y: 0.001
    width: 0.057
    height: 0.017

  battle_list:
    x: 0.908
    y: 0.361
    width: 0.058
    height: 0.091

healer:
  enabled: true

  spell:
    enabled: true
    key: "1"
    hp_below: 80.0
    cooldown_ms: 1000

  mana_potion:
    enabled: true
    key: "2"
    mana_below: 50.0
    cooldown_ms: 1000

  emergency_potion:
    enabled: true
    key: "3"
    hp_below: 30.0
    cooldown_ms: 1000

combat:
  enabled: true
  attack_key: "space"
  cooldown_ms: 1000
  min_battle_pixels: 10
  target_template_path: "templates/target_red.png"
  target_match_threshold: 0.75

pz:
  enabled: true
  template_path: "templates/pz.png"
  match_threshold: 0.82

loot:
  enabled: true
  nearby_corpses_key: "x"
  delay_ms: 200
  cooldown_ms: 500
  require_empty_battle_list: false
  priority: 3
  emergency_hp_threshold: 30.0

chat:
  enabled: true
  button_roi:
    x: 0.775521
    y: 0.971259
    width: 0.043229
    height: 0.026759
  on_template_path: "templates/chat_on.png"
  off_template_path: "templates/chat_off.png"
  match_threshold: 0.55
  max_attempts: 3
  retry_delay_ms: 300


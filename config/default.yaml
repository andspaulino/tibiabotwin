# Configuração Padrão do Tibia Bot

loop_interval_ms: 50

window:
  tibia_title: "Tibia"
  obs_title: "obs"
  allow_partial_match: true

# Regiões de Interesse (ROIs) Relativas (0.0 a 1.0)
regions:
  hp:
    x: 0.187
    y: 0.000
    width: 0.281
    height: 0.018

  mana:
    x: 0.533
    y: 0.001
    width: 0.280
    height: 0.018

  status_bar:
    x: 0.477
    y: 0.001
    width: 0.057
    height: 0.017

  battle_list:
    x: 0.908
    y: 0.361
    width: 0.058
    height: 0.091

  # ROI calibrada para o minimapa no Projetor do OBS.
  minimap:
    x: 0.911458
    y: 0.002973
    width: 0.058333
    height: 0.111001

# A percepção do minimapa usa os templates configurados abaixo e não gera input.
minimap:
  enabled: true
  marker_templates:
    starter: templates/markers/flag0.png
    flag1: templates/markers/flag1.png
    flag2: templates/markers/flag2.png
    flag3: templates/markers/flag3.png
    flag4: templates/markers/flag4.png
    protected_zone: templates/markers/flag5.png
    flag6: templates/markers/flag6.png
    flag7: templates/markers/flag7.png
    flag8: templates/markers/flag8.png
    travel: templates/markers/flag9.png
    depot: templates/markers/flag10.png
    shops: templates/markers/flag11.png
    flag12: templates/markers/flag12.png
    bank: templates/markers/flag13.png
    flag14: templates/markers/flag14.png
    flag15: templates/markers/flag15.png
    flag16: templates/markers/flag16.png
    flag17: templates/markers/flag17.png
    flag18: templates/markers/flag18.png
    flag19: templates/markers/flag19.png
  match_threshold: 0.75
  validate_cross: false
  cross_template_path: null
  cross_match_threshold: 0.88

# Os módulos abaixo são permitidos pela configuração, mas todos iniciam
# desativados e exigem a hotkey de toggle para operar.
module_hotkeys:
  healer_toggle: "home"
  combat_toggle: "end"
  loot_toggle: "page up"
  cavebot_toggle: "page down"

# A rota é carregada na inicialização, mas o módulo Cavebot continua desativado
# até o toggle. Ele só encaminha movimentos simulados em --observe-only.
cavebot:
  enabled: true
  # Requer conversão e revalidação final; permanece desativado por segurança.
  physical_clicks_enabled: true
  marker: starter
  reserved_marker_ids:
    - protected_zone
    - travel
    - depot
    - shops
    - bank
  expected_region:
    x: 0.0
    y: 0.0
    width: 1.0
    height: 1.0
  arrival_radius_pixels: 4.0
  progress_epsilon_pixels: 1.5
  stuck_timeout_ms: 15000
  click_cooldown_ms: 1500
  max_retries: 2
  # Nome do arquivo em config/hunts/ carregado automaticamente pelo Cavebot.
  selected_hunt: newhaven_left.json

healer:
  enabled: true

  spell:
    enabled: true
    key: "1"
    hp_below: 80.0
    cooldown_ms: 1000

  mana_potion:
    enabled: true
    key: "2"
    mana_below: 50.0
    cooldown_ms: 1000

  emergency_potion:
    enabled: true
    key: "3"
    hp_below: 30.0
    cooldown_ms: 1000

combat:
  enabled: true
  attack_key: "space"
  cooldown_ms: 1000
  min_battle_pixels: 10
  target_template_path: "templates/target_red.png"
  target_match_threshold: 0.75

pz:
  enabled: true
  template_path: "templates/pz.png"
  match_threshold: 0.82

loot:
  enabled: true
  nearby_corpses_key: "x"
  delay_ms: 200
  cooldown_ms: 500
  require_empty_battle_list: false
  priority: 3
  emergency_hp_threshold: 30.0
